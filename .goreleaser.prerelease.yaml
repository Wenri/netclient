version: 2
before:
  hooks:
    - go mod tidy
builds:
  -
    id: headless
    binary: netclient
    env:
      - CGO_ENABLED=1
    ldflags:
      - -s -w
    targets:
      - linux_amd64
      - linux_arm64
      - linux_mips_hardfloat
      - linux_mipsle_hardfloat
      - linux_mips64le_hardfloat
    overrides:
      - goos: linux
        goarch: arm64
        env:
          - CGO_ENABLED=1
          - CC=aarch64-linux-gnu-gcc
      - goos: linux
        goarch: mips
        gomips: hardfloat
        env:
          - CGO_ENABLED=1
          - CC=mips-linux-gnu-gcc
      - goos: linux
        goarch: mipsle
        gomips: hardfloat
        env:
          - CGO_ENABLED=1
          - CC=mipsel-linux-gnu-gcc
      - goos: linux
        goarch: mips64le
        gomips64: hardfloat
        env:
          - CGO_ENABLED=1
          - CC=mips64el-linux-gnuabi64-gcc

  -
    id: alpine
    binary: netclient
    env:
      - CGO_ENABLED=1
    ldflags:
      - -s -w
    targets:
      - linux_amd64
      - linux_arm64
    overrides:
      - goos: linux
        goarch: amd64
        env:
          - CGO_ENABLED=1
          - CC=musl-gcc
      - goos: linux
        goarch: arm64
        env:
          - CGO_ENABLED=1
          - CC=aarch64-linux-musl-gcc

archives:
  - id: default
    builds: [headless]
    format: binary
    name_template: '{{ .Binary }}-{{ .Os }}-{{ .Arch }}{{ with .Arm }}v{{ . }}{{ end }}{{ with .Mips }}-{{ . }}{{ end }}'
  - id: alpine
    builds: [alpine]
    format: binary
    name_template: '{{ .Binary }}-alpine-{{ .Arch }}'
release:
  prerelease: true
