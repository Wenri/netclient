before:
  hooks:
    - go mod tidy
builds:
  -
    id: headless
    binary: netclient
    env:
      - CGO_ENABLED=1
    ldflags:
      - -s -w
    targets:
      - linux_amd64
      - linux_arm64
      - linux_arm_5
      - linux_arm_6
      - linux_arm_7
      - linux_mips_hardfloat
      - linux_mips_softfloat
      - linux_mipsle_softfloat
      - linux_mipsle_hardfloat
    overrides:
      - goos: linux
        goarch: arm64
        env:
          - CGO_ENABLED=1
          - CC=aarch64-linux-gnu-gcc
      - goos: linux
        goarch: arm
        goarm: "5"
        env:
          - CGO_ENABLED=1
          - CC=arm-linux-gnueabi-gcc
      - goos: linux
        goarch: arm
        goarm: "6"
        env:
          - CGO_ENABLED=1
          - CC=arm-linux-gnueabihf-gcc
      - goos: linux
        goarch: arm
        goarm: "7"
        env:
          - CGO_ENABLED=1
          - CC=arm-linux-gnueabihf-gcc
      - goos: linux
        goarch: mips
        env:
          - CGO_ENABLED=1
          - CC=mips-linux-gnu-gcc
      - goos: linux
        goarch: mipsle
        env:
          - CGO_ENABLED=1
          - CC=mipsel-linux-gnu-gcc

archives:
  - format: binary
    name_template: '{{ .Binary }}-{{ .Os }}-{{ .Arch }}{{ with .Arm }}v{{ . }}{{ end }}{{ with .Mips }}-{{ . }}{{ end }}'
release:
  prerelease: true
