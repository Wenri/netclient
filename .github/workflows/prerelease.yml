name: Pre-Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v1.0.0-rc1)"
        required: true

permissions:
  contents: write

jobs:
  prerelease:
    runs-on: arc-runner-set
    container: ghcr.io/goreleaser/goreleaser-cross:v1.25.3
    steps:
      - name: Install additional cross-compilers
        run: |
          dpkg --add-architecture mips && dpkg --add-architecture mips64el
          apt-get update && apt-get install -y --no-install-recommends \
            gcc-mips-linux-gnu libc6-dev-mips-cross \
            gcc-mipsel-linux-gnu libc6-dev-mipsel-cross \
            gcc-mips64el-linux-gnuabi64 libc6-dev-mips64el-cross \
            musl-dev:arm64
      - name: Mark workspace as safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Fetch tags
        run: git fetch --force --tags
      - name: Create and push tag
        run: |
          git tag -f ${{ inputs.version }}
          git push origin ${{ inputs.version }} --force
      - name: GoReleaser
        run: goreleaser release --clean --config .goreleaser.prerelease.yaml --release-notes release.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
